# Redis RDB + AOF - Best Practice
# RDB: backup nhanh, snapshot theo chu kỳ
# AOF: khôi phục chính xác, ghi log mỗi lệnh ghi

# --- Thư mục dữ liệu (volume mount tại /data) ---
dir /data

# --- RDB (snapshot) ---
save 900 1
save 300 10
save 60 10000
rdbcompression yes
rdbchecksum yes
stop-writes-on-bgsave-error yes
dbfilename dump.rdb

# --- AOF (append-only file) ---
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# --- Khi Redis khởi động lại: load AOF nếu có, không thì load RDB ---
# (mặc định Redis ưu tiên AOF nếu cả hai tồn tại)
