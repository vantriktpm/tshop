# Frontend: Nginx (static + reverse proxy).
# Standalone (mặc định): backend trên host → BACKEND_API_HOST=host.docker.internal.
# Chạy cùng backend stack: override BACKEND_API_HOST=gateway (và dùng network của backend).

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "/api"
    ports:
      - "3000:80"
    environment:
      BACKEND_API_HOST: host.docker.internal
      BACKEND_API_PORT: "5000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
